<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meal Planner</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* Mobile First */
#planner {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  margin: 30px auto;
  max-width: 600px;
}

/* iPad/Desktop */
@media (min-width: 700px) {
  #planner {
    grid-template-columns: repeat(7, minmax(120px, 1fr));
    justify-content: center;
    max-width: 1200px;
    margin: 30px auto;
  }
}

.planner-day {
  min-height: 160px;
  padding: 15px;
  border-radius: 12px;
  background: #000;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  flex-direction: column;
}

.planner-day h3 {
  text-align: center;
  margin-bottom: 12px;
  color: #fff;
}

#recipePool .recipe-chip {
  padding: 16px 14px;
  font-size: 18px;
  min-height: 52px;
}

.remove-btn {
  color: #f5f5f5;
  cursor: pointer;
  font-weight: bold;
  margin-left: 8px;
}

input[type="search"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 8px;
}

/* ===== Glass Planner Buttons ===== */
.nav-btn,
.clear-btn {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.25);

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(6px);

  color: #ffffff;
  font-weight: 600;
  letter-spacing: 0.5px;

  cursor: pointer;

  transition:
    background 0.25s ease,
    color 0.25s ease,
    border-color 0.25s ease,
    box-shadow 0.25s ease,
    transform 0.15s ease;
}

/* Hover: Frosted Glass */
.nav-btn:hover,
.clear-btn:hover {
  background: rgba(255,255,255,0.35);
  color: #111111;
  border-color: rgba(255,255,255,0.6);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  transform: translateY(-2px);
}

/* Active / Click */
.nav-btn:active,
.clear-btn:active {
  transform: translateY(0px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
  
.nav-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px 0;
}

.week-label {
  font-size: 24px;
  font-weight: 600;
  text-align: center;
  line-height: 1.2;
}

.grocery-section {
  margin-top: 30px;
}

#groceryList {
  text-align: center;
  margin: 30px auto;
  max-width: 400px;
  padding: 20px;
  border-radius: 12px;
  background: #000;
  border: 1px solid rgba(255,255,255,0.2);
}

#groceryList ul {
  list-style-position: inside;
  padding: 0;
}

#groceryList li {
  margin: 6px 0;
}

.planner-day h3 {
  text-align: center;
  margin-bottom: 14px;
}

/* Day of week (Sun, Mon, etc.) */
.day-name {
  font-size: 26px;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.7;
}

/* Calendar date number */
.day-number {
  font-size: 30px;
  font-weight: 800;
  color: #f5f5f5;
}

/* Optional: subtle divider under header */
.planner-day h3::after {
  content: "";
  display: block;
  margin: 8px auto 0;
  width: 40%;
  height: 1px;
  background: rgba(255,255,255,0.2);
}

.day-number {
  font-size: 30px;
  font-weight: 800;
  color: #f5f5f5;
}

/* Highlight current day */
.planner-day.today {
  border: 2px solid #4CAF50;
  box-shadow:
    0 0 12px rgba(76,175,80,0.5),
    0 0 28px rgba(76,175,80,0.25);
}

.grocery-category {
  margin-top: 20px;
  text-align: left;
}

.grocery-header {
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  padding: 10px 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.grocery-items {
  list-style-position: inside;
  margin-top: 8px;
  padding-left: 10px;
}

/* THIS is the key */
.grocery-items.collapsed {
  display: none !important;
}
  
.grocery-items li {
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.grocery-items li.checked {
  text-decoration: line-through;
  opacity: 0.5;
}

.recipe-chip:active {
  transform: scale(0.98);
  opacity: 0.9;
}
  
</style>
</head>

<body>
<main>
<div class="hero">
  <div class="site-logo-wrapper">
    <img src="tritlekitchenlogo.png" alt="The Tritle Kitchen" class="site-logo">
  </div>

  <h1 class="planner-page-title">Weekly Meal Planner</h1>
</div>
  
<div class="nav-controls">
  <button class="nav-btn" id="prevWeek">← Previous</button>
  <div class="week-label" id="weekLabel"></div>
  <button class="nav-btn" id="nextWeek">Next →</button>
</div>

<select id="recipeSelect">
  <option value="">Select Recipe</option>
</select>

<input type="search" id="plannerSearch" placeholder="Search recipes..." autocomplete="off" />

<div id="recipePool"></div>

<div id="planner"></div>

<div style="text-align:center; margin-top:25px;">
  <button class="clear-btn" id="clearWeek">Clear Week</button>
</div>

<div style="text-align:center; margin-top:20px;">
  <button class="nav-btn" id="generateList">Generate Grocery List</button>
</div>

<div style="text-align:center; margin-top:20px;">
  <button class="clear-btn" id="clearChecks">Clear Ingredient Checks</button>
</div>
  
<div id="groceryList" class="grocery-section"></div>

<div class="button-wrapper">
  <a href="#" id="exportCalendar" class="accent-button">
    ADD WEEK TO CALENDAR
  </a>
</div>
  
<div class="back-link-wrapper">
<a class="accent-button" href="index.html">
  ← BACK TO RECIPE FINDER
</a>
</div>
  
</div>

<script>
  
function triggerHaptic(type = "light") {
  if (!navigator.vibrate) return;

  switch (type) {
    case "light":
      navigator.vibrate(10);
      break;
    case "medium":
      navigator.vibrate(20);
      break;
    case "heavy":
      navigator.vibrate([30, 10, 30]);
      break;
  }
}
  
const clearChecksBtn = document.getElementById("clearChecks");

clearChecksBtn.addEventListener("click", () => {
  document.querySelectorAll(".grocery-items li.checked")
    .forEach(item => item.classList.remove("checked"));
});
  
const planner = document.getElementById("planner");
const recipeSelect = document.getElementById("recipeSelect");
const recipePool = document.getElementById("recipePool");
const plannerSearch = document.getElementById("plannerSearch");
const clearWeekBtn = document.getElementById("clearWeek");
const prevWeekBtn = document.getElementById("prevWeek");
const nextWeekBtn = document.getElementById("nextWeek");
const weekLabel = document.getElementById("weekLabel");
const generateBtn = document.getElementById("generateList");
const groceryListDiv = document.getElementById("groceryList");

const daysOfWeek = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let weekOffset = 0;
let allRecipes = [];

function getWeekKey() {
  const today = new Date();
  today.setDate(today.getDate() + (weekOffset * 7));
  const year = today.getFullYear();
  const week = getWeekNumber(today);
  return `week-${year}-${week}`;
}

function getWeekNumber(date) {
  const temp = new Date(date.getTime());
  temp.setHours(0,0,0,0);
  temp.setDate(temp.getDate() + 4 - (temp.getDay()||7));
  const yearStart = new Date(temp.getFullYear(),0,1);
  return Math.ceil((((temp - yearStart)/86400000) + 1)/7);
}

function updateWeekLabel(startOfWeek) {
  const month = startOfWeek.toLocaleString('default', { month: 'long' });
  const year = startOfWeek.getFullYear();
  weekLabel.innerHTML = `${month}<br>${year}`;
}

function saveWeek() {
  const weekData = [];
  document.querySelectorAll(".planner-day").forEach(day=>{
    const recipes = [];
    day.querySelectorAll(".recipe-chip").forEach(chip=>{
      recipes.push({
        name: chip.dataset.name,
        url: chip.dataset.url
      });
    });
    weekData.push(recipes);
  });
  localStorage.setItem(getWeekKey(), JSON.stringify(weekData));
}

function loadWeek() {

  planner.innerHTML = "";

  const today = new Date();
  today.setDate(today.getDate() + (weekOffset * 7));

  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay());

  updateWeekLabel(startOfWeek);

  const saved = JSON.parse(localStorage.getItem(getWeekKey())) || [];

  for (let i = 0; i < 7; i++) {

    const currentDay = new Date(startOfWeek);
    currentDay.setDate(startOfWeek.getDate() + i);

    const day = document.createElement("div");
    day.className = "planner-day";

    const realToday = new Date();
realToday.setHours(0,0,0,0);

if (currentDay.toDateString() === realToday.toDateString()) {
  day.classList.add("today");
}

    const title = document.createElement("h3");

    const weekday = currentDay.toLocaleString('default', { weekday: 'short' });
    const dateNum = currentDay.getDate();

title.innerHTML = `
  <div class="day-name">${weekday}</div>
  <div class="day-number">${dateNum}</div>
`;

    day.appendChild(title);

    day.addEventListener("dragover", e => e.preventDefault());

day.addEventListener("drop", e => {
  e.preventDefault();
  triggerHaptic("medium");

  if (window.currentDraggedChip) {

    const dragged = window.currentDraggedChip;

    // If dragged from recipe pool
    if (recipePool.contains(dragged)) {

      // Get recipe data
      const data = JSON.parse(
        e.dataTransfer.getData("text/plain")
      );

      // Remove pool chip
      dragged.remove();

      // Create proper calendar chip (with X)
      createRecipeChip(day, data);

    } else {
      // If dragged from another day, just move it
      day.appendChild(dragged);
    }

    window.currentDraggedChip = null;
    saveWeek();
  }
});

    if (saved[i]) {
      saved[i].forEach(recipe => {
        createRecipeChip(day, recipe);
      });
    }

    planner.appendChild(day);
  }
}

function createDraggableChip(recipe) {
  const chip = document.createElement("div");
  chip.className = "recipe-chip";
  chip.textContent = recipe.name;
  chip.draggable = true;

chip.addEventListener("dragstart", e => {
  triggerHaptic("light");   // 👈 HAPTIC HERE
  e.dataTransfer.setData("text/plain", JSON.stringify(recipe));
  window.currentDraggedChip = chip;
});

  recipePool.appendChild(chip);
}

function createRecipeChip(day, recipe) {

  const chip = document.createElement("div");
  chip.className = "recipe-chip";
  chip.dataset.name = recipe.name;
  chip.dataset.url = recipe.url;
  chip.draggable = true;

  const nameSpan = document.createElement("span");
  nameSpan.textContent = recipe.name;
  nameSpan.onclick = () => window.location.href = recipe.url;

  const removeBtn = document.createElement("span");
  removeBtn.textContent = "✕";
  removeBtn.className = "remove-btn";
  removeBtn.onclick = () => {
    chip.remove();
    triggerHaptic("heavy");
    saveWeek();
  };

  chip.appendChild(nameSpan);
  chip.appendChild(removeBtn);

  chip.addEventListener("dragstart", e => {
    e.dataTransfer.setData("text/plain", JSON.stringify(recipe));
    window.currentDraggedChip = chip;
  });

  day.appendChild(chip);
}

clearWeekBtn.addEventListener("click",()=>{
  localStorage.removeItem(getWeekKey());
  loadWeek();
});

prevWeekBtn.onclick = ()=>{
  weekOffset--;
  loadWeek();
};

nextWeekBtn.onclick = ()=>{
  weekOffset++;
  loadWeek();
};

generateBtn.addEventListener("click", generateGroceryList);

function generateGroceryList() {

  const weekData = JSON.parse(localStorage.getItem(getWeekKey())) || [];
  const ingredientMap = {};

  weekData.forEach(day => {
    day.forEach(recipe => {
      const fullRecipe = allRecipes.find(r => r.url === recipe.url);

      if (fullRecipe && fullRecipe.ingredients) {
        fullRecipe.ingredients.forEach(ing => {

          const key = `${ing.item.toLowerCase()}-${ing.unit}`;

          if (!ingredientMap[key]) {
            ingredientMap[key] = { ...ing };
          } else {
            ingredientMap[key].amount += ing.amount;
          }

        });
      }
    });
  });

  const grouped = {};

  Object.values(ingredientMap).forEach(ing => {
    const category = getCategory(ing.item);
    if (!grouped[category]) grouped[category] = [];
    grouped[category].push(ing);
  });

  groceryListDiv.innerHTML = "";
const title = document.createElement("h2");
title.textContent = "Grocery List";
groceryListDiv.appendChild(title);

  Object.keys(grouped).sort().forEach(category => {

  const categoryDiv = document.createElement("div");
  categoryDiv.className = "grocery-category";

  const header = document.createElement("div");
  header.className = "grocery-header";
  header.textContent = category;

  const ul = document.createElement("ul");
  ul.className = "grocery-items";

  grouped[category]
    .sort((a,b)=>a.item.localeCompare(b.item))
    .forEach(ing => {
      const li = document.createElement("li");
li.textContent = `${formatAmount(ing.amount)} ${ing.unit} ${ing.item}`;

// CLICK TO CHECK OFF
li.addEventListener("click", () => {
  li.classList.toggle("checked");
});

ul.appendChild(li);
    });

  header.addEventListener("click", () => {
    ul.classList.toggle("collapsed");
  });

  categoryDiv.appendChild(header);
  categoryDiv.appendChild(ul);
  groceryListDiv.appendChild(categoryDiv);
});
}

function formatAmount(amount) {
  return Number.isInteger(amount) ? amount : amount.toFixed(2);
}

function getCategory(item) {
  const name = item.toLowerCase();

  // Soups & canned goods first
  if (/\b(soup|broth|stock|rotel|beans|evaporated)\b/.test(name))
    return "Canned Goods";

  // Dairy
  if (/\b(milk|cheese|cream|butter|yogurt)\b/.test(name))
    return "Dairy";

  // Meat (whole word match)
  if (/\b(chicken|beef|bacon|pork|meat|meatballs|ham|steak)\b/.test(name))
    return "Meat";

  // Produce
  if (/\b(onion|lemon|apple|tomato|cucumber|pepper|cilantro)\b/.test(name))
    return "Produce";

  // Baking
  if (/\b(flour|sugar|baking|oats)\b/.test(name))
    return "Baking";

  return "Other";
}

Promise.all([
  fetch("drinks.json").then(res => res.json()),
  fetch("dinner.json").then(res => res.json()),
  fetch("desserts.json").then(res => res.json()),
  fetch("breakfast.json").then(res => res.json()),
  fetch("miscellaneous.json").then(res => res.json())
])
.then(([drinks, dinner, desserts, breakfast, miscellaneous]) => {

  const data = {
    Drinks: drinks,
    Dinner: dinner,
    Desserts: desserts,
    Breakfast: breakfast,
    Miscellaneous: miscellaneous
  };

  Object.values(data).forEach(category => {

    if (Array.isArray(category)) {
      category.forEach(recipe => allRecipes.push(recipe));
    } 
    else {
      Object.values(category).forEach(subCat => {
        if (Array.isArray(subCat)) {
          subCat.forEach(recipe => allRecipes.push(recipe));
        }
      });
    }

  });

  allRecipes.sort((a,b)=>a.name.localeCompare(b.name));

  allRecipes.forEach(r=>{
    recipeSelect.add(new Option(r.name, r.url));
  });

  recipeSelect.addEventListener("change",()=>{
    const selected = allRecipes.find(r=>r.url===recipeSelect.value);
    if (selected) createDraggableChip(selected);
    recipeSelect.value = "";
  });

  plannerSearch.addEventListener("input",()=>{
    const term = plannerSearch.value.toLowerCase();
    recipePool.innerHTML = "";

    if (term.length < 2) return;

    allRecipes
      .filter(r=>r.name.toLowerCase().includes(term))
      .forEach(r=>createDraggableChip(r));
  });

  loadWeek();
});

document.getElementById("exportCalendar").addEventListener("click", e => {
  e.preventDefault();

  const weekData = JSON.parse(localStorage.getItem(getWeekKey())) || [];
  if (!weekData.length) return;

  const today = new Date();
  today.setDate(today.getDate() + (weekOffset * 7));

  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay());

  let ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Tritle Kitchen//Meal Planner//EN
`;

  weekData.forEach((dayRecipes, i) => {
    const eventDate = new Date(startOfWeek);
    eventDate.setDate(startOfWeek.getDate() + i);

    const dateStr = eventDate.toISOString().split("T")[0].replace(/-/g, "");

    dayRecipes.forEach(recipe => {

      const fullRecipe = allRecipes.find(r => r.url === recipe.url);

      let ingredientText = "";

      if (fullRecipe && fullRecipe.ingredients) {
        ingredientText = fullRecipe.ingredients
          .map(ing => `${formatAmount(ing.amount)} ${ing.unit} ${ing.item}`)
          .join("\\n");
      }

      const description =
        `Ingredients:\\n${ingredientText}\\n\\nPlanned using The Tritle Kitchen`
          .replace(/,/g, "\\,"); // escape commas for iOS

      ics += `
BEGIN:VEVENT
UID:${Date.now()}-${Math.random()}
DTSTAMP:${dateStr}T120000Z
DTSTART;VALUE=DATE:${dateStr}
DTEND;VALUE=DATE:${dateStr}
SUMMARY:${recipe.name}
DESCRIPTION:${description}
END:VEVENT
`;
    });
  });

  ics += "END:VCALENDAR";

  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  window.location.href = url;
});
  
</script>
</main>
</body>
</html>
