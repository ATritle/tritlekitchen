<!DOCTYPE html>
<html lang="en">
<head>
<!-- Open Graph / Discord Embed -->
<meta property="og:title" content="Recipe Selector + Weekly Meal Planner">
<meta property="og:description" content="Browse recipes, drag & drop your weekly meal plan, and auto-generate a grocery list. Built for kitchen tablet use.">
<meta property="og:image" content="https://atritle.github.io/tritlekitchen/preview.png">
<meta property="og:url" content="https://atritle.github.io/tritlekitchen/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<!-- Recommended -->
<meta name="twitter:card" content="summary_large_image">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Tritle Kitchen</title>
    <!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<!-- iOS Home Screen Icon -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Recipes">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="hero">
<div class="site-logo-wrapper">
  <img src="tritlekitchenlogo.png" alt="The Tritle Kitchen" class="site-logo">
</div>

  <!-- Main Category -->
  <select id="mainCategory">
    <option value="">Select Category</option>
  </select>

  <!-- Sub Category -->
  <select id="subCategory" disabled>
    <option value="">Select Sub-Category</option>
  </select>

  <!-- Recipe -->
  <select id="recipe" disabled>
    <option value="">Select Recipe</option>
  </select>

  <!-- 🔎 Recipe Name Search -->
<div class="search-wrapper">
  <span class="search-icon">🔎</span>
  <input
    type="search"
    id="recipeSearch"
    placeholder="Search recipe NAME"
    autocomplete="off"
  />
</div>
<ul id="searchResults" class="searchResults"></ul>

<div class="search-wrapper">
  <span class="search-icon">🧄</span>
  <input
    type="search"
    id="ingredientSearch"
    placeholder="Search recipe INGREDIENT"
    autocomplete="off"
  />
</div>
<ul id="ingredientResults" class="searchResults"></ul>

<div class="app-description">
  <p>Choose a category, select a recipe, or use search to quickly find what you want to cook.</p>
  <p>Built for tablet use in the kitchen, with simple navigation and easy-to-read layouts.</p>
  <p>
  <a href="meal-planner.html" class="accent-button">
  GO TO MEAL PLANNER ->
  </a>
  </p>
</div>
  
<div class="button-wrapper">
</div>
  
  <script>
    Promise.all([
  fetch("drinks.json").then(res => res.json()),
  fetch("dinner.json").then(res => res.json()),
  fetch("desserts.json").then(res => res.json()),
  fetch("breakfast.json").then(res => res.json()),
  fetch("miscellaneous.json").then(res => res.json())
])
.then(([drinks, dinner, desserts, breakfast, miscellaneous]) => {

  const data = {
    Drinks: drinks,
    Dinner: dinner,
    Desserts: desserts,
    Breakfast: breakfast,
    Miscellaneous: miscellaneous
  };

  init(data);
});
    function init(data) {
      const main = document.getElementById("mainCategory");
      const sub = document.getElementById("subCategory");
      const recipe = document.getElementById("recipe");

Object.keys(data)
  .sort((a, b) => a.localeCompare(b))
  .forEach(cat => {
    main.add(new Option(cat, cat));
  });


      main.addEventListener("change", () => {
        document.getElementById("searchResults").innerHTML = "";
document.getElementById("recipeSearch").value = "";
        sub.innerHTML = "<option value=''>Select Sub-Category</option>";
        recipe.innerHTML = "<option value=''>Select Recipe</option>";
        recipe.disabled = true;
        if (!main.value) {
          sub.disabled = true;
          return;
        }

        Object.keys(data[main.value])
  .sort((a, b) => a.localeCompare(b))
  .forEach(subCat => {
    sub.add(new Option(subCat, subCat));
  });


        sub.disabled = false;
      });

      sub.addEventListener("change", () => {
        document.getElementById("searchResults").innerHTML = "";
document.getElementById("recipeSearch").value = "";
        recipe.innerHTML = "<option value=''>Select Recipe</option>";
        if (!sub.value) {
          recipe.disabled = true;
          return;
        }

       data[main.value][sub.value]
  .slice()
  .sort((a, b) => a.name.localeCompare(b.name))
  .forEach(r => {
    recipe.add(new Option(r.name, r.url));
  });


        recipe.disabled = false;
      });

recipe.addEventListener("change", () => {
  if (recipe.value) {
    window.location.href = recipe.value;
  }
});

            setupSearch(data);

    }
        function setupSearch(data) {
  const searchInput = document.getElementById("recipeSearch");
  const results = document.getElementById("searchResults");
  const ingredientInput = document.getElementById("ingredientSearch");
  const ingredientResults = document.getElementById("ingredientResults");

  const allRecipes = [];

  Object.values(data).forEach(category =>
    Object.values(category).forEach(subCat =>
      subCat.forEach(recipe => allRecipes.push(recipe))
    )
  );

  // 🔎 NAME SEARCH
  searchInput.addEventListener("input", () => {
    const term = searchInput.value.toLowerCase();
    results.innerHTML = "";

    if (term.length < 2) return;

    ingredientInput.value = "";
    ingredientResults.innerHTML = "";
    
    allRecipes
      .filter(r => r.name.toLowerCase().includes(term))
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(r => {
        const li = document.createElement("li");
        li.textContent = r.name;
        li.onclick = () => window.open(r.url, "_blank");
        results.appendChild(li);
      });
  });

// 🧄 INGREDIENT SEARCH (MATCH ALL)
ingredientInput.addEventListener("input", () => {
  const raw = ingredientInput.value.toLowerCase();
  ingredientResults.innerHTML = "";

  if (raw.length < 2) return;

  // Split by comma and clean up
  const searchTerms = raw
    .split(",")
    .map(term => term.trim())
    .filter(term => term.length > 0);

  if (searchTerms.length === 0) return;

  allRecipes
    .filter(recipe => {
      if (!recipe.ingredients) return false;

      const ingredientNames = recipe.ingredients.map(ing =>
        ing.item.toLowerCase()
      );

      // 🔥 EVERY search term must match at least one ingredient
      return searchTerms.every(searchTerm =>
        ingredientNames.some(name =>
          name.includes(searchTerm)
        )
      );
    })
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(recipe => {
      const li = document.createElement("li");
      li.textContent = recipe.name;
      li.onclick = () => window.open(recipe.url, "_blank");
      ingredientResults.appendChild(li);
    });
});
}

  </script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js?v=" + Date.now())
    .then(registration => {

      // If there's an updated SW waiting
      if (registration.waiting) {
        registration.waiting.postMessage({ type: "SKIP_WAITING" });
      }

      // Detect new SW installing
      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            // 🔥 Auto reload when new version takes over
            window.location.reload();
          }
        });
      });

    });
}
</script>

</body>
</html>
